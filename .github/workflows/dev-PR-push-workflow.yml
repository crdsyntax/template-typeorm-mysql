name: pr-check-validation

on:
  pull_request:
    branches: [dev, main, qa]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Full Strict Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20 (strict)
        uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
          cache: "npm"

      - name: Validate lockfile integrity
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Ensure no package drift
        run: |
          git diff --exit-code package-lock.json || (echo "❌ Lockfile modified. Run npm install locally." && exit 1)

      # -----------------------
      # FORMATO + LINT
      # -----------------------
      - name: Prettier check (strict)
        run: npm run format:check

      - name: ESLint (zero tolerance)
        run: npm run lint -- --max-warnings=0

      # -----------------------
      # TYPE SAFETY
      # -----------------------
      - name: Strict TypeScript check
        run: npx tsc --noEmit --pretty false

      # -----------------------
      # TESTS
      # -----------------------
      - name: Run tests with coverage
        run: npm run test:cov

      - name: Enforce coverage threshold
        run: |
          npx nyc check-coverage --lines 80 --functions 80 --branches 70 --statements 80

      # -----------------------
      # SECURITY
      # -----------------------
      - name: Dependency audit (fail on high)
        run: npm audit --audit-level=high

      # -----------------------
      # BUILD
      # -----------------------
      - name: Clean build
        run: |
          rm -rf dist
          npm run build

      - name: Validate dist integrity
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "❌ Missing or empty dist folder."
            exit 1
          fi

      # -----------------------
      # REPRODUCIBILITY CHECK
      # -----------------------
      - name: Rebuild and compare
        run: |
          cp -r dist dist_backup
          rm -rf dist
          npm run build
          diff -r dist dist_backup || (echo "❌ Build is not deterministic." && exit 1)

      # -----------------------
      # FINAL GUARD
      # -----------------------
      - name: Ensure clean repo state
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Repository is not clean after checks."
            git status --porcelain
            exit 1
          fi